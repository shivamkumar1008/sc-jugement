services:
  scraper:
    build: .
    container_name: writon-scraper
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Tesseract is extremely thread-heavy. Limit it to 1 thread per worker
      # otherwise 5 workers * 4 threads = 20 threads thrashing on a 4-core VPS!
      - OMP_THREAD_LIMIT=1
    # Override here (not in Dockerfile) so you can retune without rebuilding —
    # `docker compose up -d --build` picks up edits to this line immediately.
    command: ["--workers", "4"]
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
