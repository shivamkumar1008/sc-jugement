services:
  scraper:
    build: .
    container_name: writon-scraper
    restart: unless-stopped
    env_file:
      - .env
    # Override here (not in Dockerfile) so you can retune without rebuilding —
    # `docker compose up -d --build` picks up edits to this line immediately.
    command: ["--workers", "4"]
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
